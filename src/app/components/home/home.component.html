<div class="px-36  flex  screen">

  <div class="chats-list rounded-md bg-slate-300 m-7  shadow-lg">

    <div class="m-2">
      <mat-form-field class="w-full ">
        <input matInput placeholder="Search for Users . . ." type="text" [formControl]="searchControl"
          [matAutocomplete]="auto">
        <mat-autocomplete autoActiveFirstOption #auto="matAutocomplete">
          @for (user of users$ | async; track user) {
          <mat-option [value]="user.displayName" (click)="createChat(user)">{{user.displayName}}</mat-option>
          }
        </mat-autocomplete>
      </mat-form-field>
    </div>

  </div>


  <div class="messages rounded-md shadow-lg bg-orange-100 m-7">

  </div>
</div>
